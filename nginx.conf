server {
    listen 80;
    server_name games.firuzi.com;

    # Redirect root requests to a 404
    location = / {
        return 404;
    }

    # Serve Secret Hitler game under /secret-hitler
    location /secret-hitler {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /secret-hitler/index.html;
    }

    # Proxy API requests under /secret-hitler/api
    location /secret-hitler/api {
        proxy_pass http://backend:3000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket requests under /secret-hitler/ws
    location /secret-hitler/ws {
        proxy_pass http://backend:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
