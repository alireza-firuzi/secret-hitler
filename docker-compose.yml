version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: secret_hitler_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./server
    container_name: secret_hitler_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/secret_hitler
      - PORT=3000
      - GEMINI_API_KEY
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
    container_name: secret_hitler_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
