name: Deploy Secret Hitler to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Web Client
        run: |
          flutter pub get
          flutter build web --release --base-href "/secret-hitler/"

      - name: Deploy files to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "Dockerfile,docker-compose.yml,nginx.conf,build/web/**,server/**"
          target: "/home/deploy/secret-hitler"
          rm: true

      - name: Run SSH commands on VPS to launch containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/secret-hitler
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
            # Install docker & docker-compose if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y docker.io docker-compose
            fi
            docker-compose down
            docker-compose up -d --build
            sudo ufw allow 80/tcp
            sudo ufw allow 3000/tcp
