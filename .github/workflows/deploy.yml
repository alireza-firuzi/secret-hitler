name: Deploy Secret Hitler to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Web Client
        run: |
          flutter pub get
          flutter build web --release --base-href "/secret-hitler/" \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=FIREBASE_AUTH_DOMAIN="${{ secrets.FIREBASE_AUTH_DOMAIN }}" \
            --dart-define=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --dart-define=FIREBASE_STORAGE_BUCKET="${{ secrets.FIREBASE_STORAGE_BUCKET }}" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" \
            --dart-define=FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}"

      - name: Deploy files to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "Dockerfile,docker-compose.yml,nginx.conf,build/web/**,server/**"
          target: "/home/deploy/secret-hitler"
          rm: true

      - name: Run SSH commands on VPS to launch containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /home/deploy/secret-hitler
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
            echo "FARAZSMS_API_KEY=${{ secrets.FARAZSMS_API_KEY || 'oXpOP50z04q3bde7cULKJq1Fwbh1gvUJJT7menHAy488KsHnFA' }}" >> .env
            echo "FARAZSMS_PATTERN_CODE=${{ secrets.FARAZSMS_PATTERN_CODE }}" >> .env
            echo "FARAZSMS_ORIGINATOR=${{ secrets.FARAZSMS_ORIGINATOR }}" >> .env
            # Install docker & docker-compose if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y docker.io docker-compose
            fi
            docker-compose down
            docker-compose up -d --build
            sudo ufw allow 80/tcp
            sudo ufw allow 3000/tcp
